# Local Postgres for schema / flow testing only (not production).
# Usage: docker compose -f docker-compose.db-test.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: valgate-db-test
    environment:
      POSTGRES_USER: valgate
      POSTGRES_PASSWORD: valgate
      POSTGRES_DB: valgate_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valgate -d valgate_test"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - valgate_db_test_data:/var/lib/postgresql/data

volumes:
  valgate_db_test_data:
