name: CI

# Make-green-first CI.
#
# This is the first automated gate on the repo, so it is deliberately honest
# about pre-existing debt:
#   - `test`      runs the Vitest query-layer suite and BLOCKS merge. It must
#                 stay green — it is the contract guard for "every number traces
#                 to a real seed field/derivation".
#   - `lint`      BLOCKS merge. `npm run lint` is scoped to the source we hand-
#                 write (app / lib / components) and is at zero errors. It does
#                 NOT lint the parked Convex backend or the Figma-generated
#                 `imports/` tree — those carry their own large debt and are a
#                 separate cleanup; gating UI work on them would be wrong.
#   - `typecheck` runs as an informational report (continue-on-error), because
#                 the repo still carries 7 known pre-existing tsc errors that did
#                 NOT come from this work. It shows the trend without blocking.
#                 Ratchet it to required once those are fixed.
#
# There is intentionally no `next build` job: a production build needs the
# Mapbox token and the project sets `ignoreBuildErrors`, so a build job would
# add cost and CI minutes while catching nothing the checks below don't.

on:
  push:
    # Run on every working branch so authors get feedback before opening a PR.
    branches:
      - "**"
  pull_request:
    # Gate the two long-lived integration branches.
    branches:
      - valgate-webapp-nextjs-v1.0.2
      - main

jobs:
  test:
    name: test (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Match the local toolchain (Node 22).
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      # The seed JSON is committed under public/data, so the query-layer tests
      # read it in CI with zero extra setup.
      - name: Run tests
        run: npm test

  typecheck:
    name: typecheck (report-only)
    runs-on: ubuntu-latest
    # Non-blocking while the 7 known pre-existing tsc errors are outstanding.
    # Flip to a required check (remove continue-on-error) once they are fixed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit

  lint:
    name: lint (required)
    runs-on: ubuntu-latest
    # Blocking: `npm run lint` is scoped to app/lib/components and is green.
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
